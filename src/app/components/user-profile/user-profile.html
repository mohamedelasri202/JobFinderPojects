<div class="min-h-screen bg-gray-50 py-12 px-4 sm:px-6 lg:px-8">
  <div class="max-w-md mx-auto bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
    
    <div class="h-32 bg-gradient-to-r from-blue-600 to-indigo-700"></div>
    
    <div class="px-8 pb-8">
      <div class="relative -mt-12 mb-6">
        <div class="inline-block p-2 bg-white rounded-2xl shadow-sm">
          <div class="h-20 w-20 bg-blue-100 rounded-xl flex items-center justify-center text-blue-600">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-12 h-12">
              <path stroke-linecap="round" stroke-linejoin="round" d="M17.982 18.725A7.488 7.488 0 0 0 12 15.75a7.488 7.488 0 0 0-5.982 2.975m11.963 0a9 9 0 1 0-11.963 0m11.963 0A8.966 8.966 0 0 1 12 21a8.966 8.966 0 0 1-5.982-2.275M15 9.75a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
            </svg>
          </div>
        </div>
      </div>

      <h2 class="text-2xl font-bold text-gray-900">Account Settings</h2>
      <p class="text-gray-500 text-sm mb-8">Update your personal information and profile details.</p>

      <form [formGroup]="profileForm" (ngSubmit)="onSubmit()" class="space-y-5">
        
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1.5">Full Name</label>
          <input 
            formControlName="name" 
            type="text" 
            placeholder="John Doe"
            class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all outline-none text-gray-800"
          >
        </div>

        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1.5">Username</label>
          <div class="relative">
            <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-sm">@</span>
            <input 
              formControlName="userName" 
              type="text" 
              placeholder="johndoe"
              class="w-full pl-8 pr-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all outline-none text-gray-800"
            >
          </div>
        </div>

        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1.5">Email Address</label>
          <input 
            formControlName="email" 
            type="email" 
            placeholder="john@example.com"
            class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all outline-none text-gray-800"
          >
          <p *ngIf="profileForm.get('email')?.invalid && profileForm.get('email')?.touched" class="mt-1 text-xs text-red-500">
            Please enter a valid email address.
          </p>
        </div>

        <div class="pt-4 flex flex-col gap-3">
          <button 
            type="submit" 
            [disabled]="profileForm.invalid || profileForm.pristine"
            class="w-full py-3 px-4 bg-blue-600 hover:bg-blue-700 disabled:bg-blue-300 text-white font-bold rounded-xl shadow-md shadow-blue-200 transition-all flex items-center justify-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5" />
            </svg>
            Save Changes
          </button>
          
          <button 
            type="button" 
            routerLink="/"
            class="w-full py-3 px-4 bg-white border border-gray-200 text-gray-600 font-semibold rounded-xl hover:bg-gray-50 transition-all">
            Cancel
          </button>
        </div>

      </form>
    </div>
  </div>
</div>
