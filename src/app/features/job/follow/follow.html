<form [formGroup] ="followForm" (ngSubmit)="onSubmit()">
 <button 
    type="submit" 
    [disabled]="isFollowed$ | async"
    [ngClass]="(isFollowed$ | async) 
      ? 'w-full py-2 px-4 bg-gray-100 text-gray-400 border border-gray-200 rounded text-sm font-bold cursor-not-allowed' 
      : 'w-full py-2 px-4 border border-blue-600 text-blue-600 rounded text-sm font-bold hover:bg-blue-50 transition'"
  >
    @if (isFollowed$ | async) {
      <span>Saved ✅</span>
    } @else {
      <span>follow</span>
    }
  </button>
</form>
