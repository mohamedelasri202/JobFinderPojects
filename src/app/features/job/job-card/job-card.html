<div class="bg-white p-6 rounded-lg shadow-md border border-gray-100 hover:shadow-lg transition-shadow duration-300 flex flex-col justify-between">
  <div>
    <div class="flex justify-between items-start mb-2">
      <span class="text-xs font-bold text-blue-600 uppercase tracking-wider bg-blue-50 px-2 py-1 rounded">
        {{ job.levels[0]?.name || 'All Levels' }}
      </span>
      <small class="text-gray-400">{{ job.publication_date | date:'shortDate' }}</small>
    </div>

    <h4 class="text-lg font-bold text-gray-900 leading-tight mb-1">{{ job.name }}</h4>
    <p class="text-gray-600 font-medium mb-4">{{ job.company.name }}</p>

    <div class="flex items-center text-sm text-gray-500 mb-4">
      <svg class="h-4 w-4 mr-1 text-gray-400" fill="currentColor" viewBox="0 0 20 20">
        <path fill-rule="evenodd" d="M5.05 4.05a7 7 0 119.9 9.9L10 18.9l-4.95-4.95a7 7 0 010-9.9zM10 11a2 2 0 100-4 2 2 0 000 4z" clip-rule="evenodd" />
      </svg>
      {{ job.locations[0]?.name || 'Remote / Flexible' }}
    </div>
  </div>

  <div class="space-y-2">
    <a [href]="job.refs.landing_page" target="_blank"
      class="block w-full text-center py-2 px-4 bg-gray-900 text-white rounded font-semibold hover:bg-black transition">
      View Offer Details
    </a>

    <div class="flex gap-2" *ngIf="isAuth">
      <button class="flex-1 py-2 px-4 border border-blue-600 text-blue-600 rounded text-sm font-bold hover:bg-blue-50 transition">
        Save
      </button>
      <button class="flex-1 py-2 px-4 bg-green-600 text-white rounded text-sm font-bold hover:bg-green-700 transition">
        Apply
      </button>
    </div>
  </div>
</div>
