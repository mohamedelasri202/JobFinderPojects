<div class="group relative bg-white/10 backdrop-blur-xl rounded-[2rem] p-6 border border-white/20 shadow-[0_20px_50px_rgba(0,0,0,0.1)] hover:shadow-indigo-500/20 hover:-translate-y-2 transition-all duration-500 flex flex-col justify-between overflow-hidden">
  
  <div class="absolute -top-24 -right-24 w-48 h-48 bg-indigo-500/10 rounded-full blur-3xl group-hover:bg-indigo-500/20 transition-all duration-700"></div>

  <div class="relative z-10">
    <div class="flex justify-between items-start mb-4">
      <span class="text-[10px] font-black text-indigo-400 uppercase tracking-[0.2em] bg-indigo-500/10 px-3 py-1.5 rounded-full border border-indigo-500/20">
        {{ job.levels[0]?.name || 'All Levels' }}
      </span>
      <small class="text-slate-500 font-mono tracking-tighter">{{ job.publication_date | date:'shortDate' }}</small>
    </div>

    <h4 class="text-xl font-black text-slate-900 leading-tight mb-1 group-hover:text-indigo-600 transition-colors">{{ job.name }}</h4>
    <p class="text-slate-500 font-bold text-sm mb-6 flex items-center">
      <span class="w-1.5 h-1.5 rounded-full bg-indigo-400 mr-2"></span>
      {{ job.company.name }}
    </p>

    <div class="flex items-center text-xs font-bold text-slate-400 mb-6 uppercase tracking-widest">
      <svg class="h-4 w-4 mr-2 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path>
      </svg>
      {{ job.locations[0]?.name || 'Remote / Flexible' }}
    </div>
  </div>

  <div class="relative z-10 space-y-3">
    <a [href]="job.refs.landing_page" target="_blank"
      class="block w-full text-center py-3 px-4 bg-slate-900 text-white text-xs font-black uppercase tracking-[0.15em] rounded-xl hover:bg-indigo-600 hover:shadow-lg hover:shadow-indigo-200 transition-all duration-300">
      View Offer Details
    </a>

    <div class="flex gap-3" *ngIf="isAuth">
      <app-favorite [jobData]="job" class="flex-1 transform hover:scale-105 transition-transform"></app-favorite>
      <app-follow [jobData]="job" class="flex-1 transform hover:scale-105 transition-transform"></app-follow>
    </div>
  </div>
</div>
