<header class="bg-white shadow">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex justify-between h-16">
      <div class="flex">
        <div class="flex-shrink-0 flex items-center">
          <a routerLink="/" class="text-2xl font-bold text-blue-600">JobFinder</a>
        </div>
        
        <div class="hidden sm:ml-6 sm:flex sm:space-x-8">
          <a routerLink="/" 
             routerLinkActive="border-blue-500 text-gray-900" 
             [routerLinkActiveOptions]="{exact: true}"
             class="border-transparent text-gray-500 hover:border-gray-300 hover:text-gray-700 inline-flex items-center px-1 pt-1 border-b-2 text-sm font-medium">
            Home
          </a>
          <a routerLink="/follows" 
             routerLinkActive="border-blue-500 text-gray-900"
             class="border-transparent text-gray-500 hover:border-gray-300 hover:text-gray-700 inline-flex items-center px-1 pt-1 border-b-2 text-sm font-medium">
            Followed Job Offers
          </a>
          <a routerLink="/favorites" 
             routerLinkActive="border-blue-500 text-gray-900"
             class="border-transparent text-gray-500 hover:border-gray-300 hover:text-gray-700 inline-flex items-center px-1 pt-1 border-b-2 text-sm font-medium">
            Favorites
          </a>
        </div>
      </div>

      <div class="hidden sm:ml-6 sm:flex sm:items-center">
        
        <div class="ml-3 relative flex items-center space-x-4" *ngIf="user$ | async as user; else loginButton">
          
          <a routerLink="/profile" class="flex flex-col text-right hover:opacity-75 transition-opacity cursor-pointer">
            <span class="text-sm font-medium text-gray-900">{{ user.name }}</span>
            <span class="text-xs text-gray-500">@{{ user.userName }}</span>
          </a>

          <button (click)="logOut()" type="button"
            class="bg-white p-1 rounded-full text-gray-400 hover:text-red-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-colors">
            <span class="sr-only">Log out</span>
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
              stroke="currentColor" class="w-6 h-6">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15M12 9l-3 3m0 0l3 3m-3-3h12.75" />
            </svg>
          </button>
        </div>

        <ng-template #loginButton>
          <a routerLink="/login" class="text-gray-500 hover:text-gray-700 text-sm font-medium">
            Log in
          </a>
        </ng-template>
      </div>
    </div>
  </div>
</header>
